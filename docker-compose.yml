services:
  db:
    image: mysql:8.0
    container_name: adonis_db
    restart: always
    environment:
      MYSQL_DATABASE: 'banco_adonis'
      MYSQL_ROOT_PASSWORD: '1234' # Use apenas esta para o root
    ports:
      - '3306:3306'
    volumes:
      - adonis_db_data:/var/lib/mysql
  
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: adonis_php
    restart: always
    ports:
      - '8080:80'
    environment:
      - PMA_HOST=db
      - MYSQL_ROOT_PASSWORD=1234 # Deve ser igual à do db
    depends_on:
      - db

volumes:
  adonis_db_data: